<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 灵感接力</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f1117; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
        .msg.user { align-self: flex-end; background: #2563eb; color: #fff; }
        .msg.bot { align-self: flex-start; background: #1e1e2e; border: 1px solid #333; }
        .msg.loading { opacity: 0.6; }
        #bar { display: flex; gap: 8px; padding: 12px 20px; background: #1a1a2e; border-top: 1px solid #333; }
        #input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #444; background: #0f1117; color: #e0e0e0; font-size: 15px; outline: none; }
        #input:focus { border-color: #2563eb; }
        #btn { padding: 10px 20px; border-radius: 8px; border: none; background: #2563eb; color: #fff; font-size: 15px; cursor: pointer; }
        #btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="bar">
        <input id="input" placeholder="输入你的问题..." autocomplete="off" />
        <button id="btn" onclick="send()">发送</button>
    </div>
    <script>
        const RELAY = 'http://localhost:4256';
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const btn = document.getElementById('btn');

        input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });

        function addMsg(text, role) {
            const d = document.createElement('div');
            d.className = 'msg ' + role;
            d.textContent = text;
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
            return d;
        }

        async function send() {
            const prompt = input.value.trim();
            if (!prompt) return;
            input.value = '';
            btn.disabled = true;
            addMsg(prompt, 'user');
            const loading = addMsg('思考中...', 'bot loading');

            try {
                const res = await fetch(RELAY + '/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const { taskId } = await res.json();

                // 轮询结果
                const reply = await poll(taskId);
                loading.textContent = reply;
                loading.classList.remove('loading');
            } catch (e) {
                loading.textContent = '出错了: ' + e.message;
                loading.classList.remove('loading');
            }
            btn.disabled = false;
            input.focus();
        }

        async function poll(taskId) {
            for (let i = 0; i < 60; i++) {
                await new Promise(r => setTimeout(r, 1000));
                const res = await fetch(RELAY + '/api/result/' + taskId);
                if (res.ok) {
                    const data = await res.json();
                    return data.reply;
                }
            }
            throw new Error('超时，未收到回复');
        }
    </script>
</body>
</html>
